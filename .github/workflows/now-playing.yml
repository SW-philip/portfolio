name: Update Now Playing

# No github.event.* inputs are used in run: steps — no injection surface.

on:
  schedule:
    # Every 5 minutes — minimum for GitHub Actions public repos
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch now-playing data
        run: node scripts/fetch-now-playing.js > assets/now-playing.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/now-playing.json
          git diff --staged --quiet || git commit -m "chore: now-playing $(date -u +%H:%M)"
          git push
