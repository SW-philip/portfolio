<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>philipjrepko.com</title>
  <style>
    :root {
      --base: #232136;
      --surface: #2a273f;
      --muted: #6e6a86;
      --subtle: #908caa;
      --text: #e0def4;
      --gold: #f6c177;
      --iris: #c4a7e7;
      --hl-med: #44415a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--base);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
    }

    .center {
      max-width: 520px;
      width: 100%;
    }

    .who {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .name {
      font-size: clamp(32px, 7vw, 56px);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 40px;
      color: var(--text);
    }

    .name span {
      color: var(--gold);
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--hl-med);
      margin-bottom: 32px;
    }

    .answer {
      font-size: clamp(16px, 2.5vw, 19px);
      color: var(--subtle);
      line-height: 1.65;
      max-width: 400px;
    }

    .answer em {
      font-style: normal;
      color: var(--iris);
    }

    .footer {
      margin-top: 64px;
      font-size: 13px;
      color: var(--muted);
    }

    .footer a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--hl-med);
    }

    .footer a:hover { color: var(--subtle); }

    .dots {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
    }
  </style>
</head>
<body>
  <div class="center">
    <p class="who">Who is<span class="dots" id="dots"></span></p>
    <h1 class="name">philip<span>j</span>repko.com</h1>
    <div class="divider"></div>
    <p class="answer">The answer will <em>neither surprise nor bore you.</em> It's coming though. Give it a minute.</p>
    <div class="footer">
      <a href="mailto:me@philipjrepko.com">me@philipjrepko.com</a>
    </div>
  </div>

  <script>
    const el = document.getElementById('dots');
    const frames = ['', '.', '..', '...', '....', '.....', '......', '.......', '........', '.........', '..........'];
    let i = 0;
    let dir = 1;
    setInterval(() => {
      el.textContent = frames[i];
      i += dir;
      if (i >= frames.length - 1) dir = -1;
      if (i <= 0) dir = 1;
    }, 120);
  </script>
</body>
</html>
